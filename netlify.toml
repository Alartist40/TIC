[build]
  command = "npm install"
  functions = "netlify/functions"
  publish = "."

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Caching rules
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "max-age=3600, public"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "max-age=300, public"
